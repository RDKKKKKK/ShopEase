name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Cache Maven dependencies
        uses: actions/cache@v2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: '17'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t mall/mall-admin:1.0-SNAPSHOT .
          docker build -t mall/mall-search:1.0-SNAPSHOT .
          docker build -t mall/mall-monitor:1.0-SNAPSHOT .
          docker build -t mall/mall-gateway:1.0-SNAPSHOT .
          docker build -t mall/mall-auth:1.0-SNAPSHOT .
          docker build -t mall/mall-portal:1.0-SNAPSHOT .

      - name: Push Docker image
        run: |
          docker push -t mall/mall-admin:1.0-SNAPSHOT
          docker push -t mall/mall-search:1.0-SNAPSHOT
          docker push -t mall/mall-monitor:1.0-SNAPSHOT
          docker push -t mall/mall-gateway:1.0-SNAPSHOT
          docker push -t mall/mall-auth:1.0-SNAPSHOT
          docker push -t mall/mall-portal:1.0-SNAPSHOT